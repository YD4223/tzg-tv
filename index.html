<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>童真阁</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📺</text></svg>">
    <style>
        :root {
            --bg: #f7f8fa;
            --card: #ffffff;
            --border: #e8eaed;
            --text: #1a1a2e;
            --text2: #5a6070;
            --text3: #9ca3b8;
            --accent: #4f6ef7;
            --accent2: #6c8aff;
            --live: #ef4444;
            --radius: 16px;
            --shadow: 0 2px 12px rgba(0,0,0,0.06);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.12);
            --top-bg: rgba(247,248,250,0.92);
            --bnav-bg: rgba(247,248,250,0.96);
        }
        html.dark {
            --bg: #111318;
            --card: #1a1d24;
            --border: #1e2028;
            --text: #f0f0f0;
            --text2: #9ca3af;
            --text3: #4b5563;
            --shadow: 0 2px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 30px rgba(0,0,0,0.5);
            --top-bg: rgba(17,19,24,0.92);
            --bnav-bg: rgba(17,19,24,0.96);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'SF Pro Display', sans-serif;
            background: var(--bg); color: var(--text);
            min-height: 100vh; -webkit-font-smoothing: antialiased;
        }

        /* ===== 顶部 ===== */
        .top {
            position: sticky; top: 0; z-index: 200;
            background: var(--top-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .top-inner {
            max-width: 1200px; margin: 0 auto;
            display: flex; align-items: center; gap: 20px;
            height: 64px;
        }
        .brand {
            font-size: 1.3rem; font-weight: 800; letter-spacing: -0.3px;
            color: var(--text); white-space: nowrap;
        }
        .brand b { color: var(--accent); }
        .search-bar {
            flex: 1; max-width: 480px;
            display: flex; align-items: center; gap: 8px;
        }
        .search-bar input {
            flex: 1; padding: 10px 18px;
            border: 1.5px solid var(--border); border-radius: 100px;
            background: var(--card); font-size: 0.88rem; outline: none;
            color: var(--text); transition: all 0.2s; font-family: inherit;
        }
        .search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(79,110,247,0.1); }
        .search-bar input::placeholder { color: var(--text3); }
        .search-bar button {
            background: var(--accent); border: none; color: #fff;
            width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
            cursor: pointer; font-size: 0.9rem;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .search-bar button:hover { background: var(--accent2); }
        .theme-btn {
            width: 36px; height: 36px; border-radius: 50%;
            border: 1.5px solid var(--border);
            background: var(--card); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; flex-shrink: 0; transition: all 0.2s;
        }
        .theme-btn:hover { border-color: var(--accent); }

        /* 分类 */
        .tabs {
            max-width: 1200px; margin: 0 auto;
            display: flex; gap: 4px; overflow-x: auto;
            padding: 10px 0 12px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 6px 16px; border-radius: 100px;
            font-size: 0.82rem; font-weight: 500;
            cursor: pointer; white-space: nowrap; flex-shrink: 0;
            border: 1.5px solid transparent;
            color: var(--text2); background: transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); background: var(--card); }
        .tab.on {
            background: var(--accent); color: #fff;
            box-shadow: 0 2px 10px rgba(79,110,247,0.3);
        }

        /* ===== 主内容 ===== */
        .page {
            max-width: 1200px; margin: 0 auto;
            padding: 24px 24px 100px;
        }

        .page-title {
            font-size: 1rem; font-weight: 700; color: var(--text);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .page-title .dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent);
        }

        /* 视频网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .item {
            cursor: pointer; border-radius: var(--radius); overflow: hidden;
            background: var(--card); border: 1px solid var(--border);
            transition: all 0.25s; box-shadow: var(--shadow);
        }
        .item:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(79,110,247,0.2);
        }
        .item:active { transform: scale(0.98); }

        .thumb {
            position: relative; overflow: hidden;
            aspect-ratio: 16/9; background: #f0f2f5;
        }
        .thumb img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; transition: transform 0.4s;
        }
        .item:hover .thumb img { transform: scale(1.05); }

        .play {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.3);
            opacity: 0; transition: opacity 0.2s;
        }
        .item:hover .play { opacity: 1; }
        .play-inner {
            width: 50px; height: 50px; border-radius: 50%;
            background: rgba(255,255,255,0.95);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; padding-left: 3px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .vdur {
            position: absolute; bottom: 8px; right: 8px;
            background: rgba(0,0,0,0.72);
            color: #fff; padding: 2px 7px; border-radius: 5px;
            font-size: 0.7rem; font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .detail { padding: 12px 14px 14px; }
        .vtitle {
            font-size: 0.85rem; font-weight: 500; color: var(--text);
            line-height: 1.5; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; margin-bottom: 10px; min-height: 2.8em;
        }
        .vmeta {
            display: flex; align-items: center; justify-content: space-between;
        }
        .vup { font-size: 0.72rem; color: var(--text3); }
        .vv { font-size: 0.72rem; color: var(--text3); }

        /* 加载/错误 */
        .state {
            grid-column: 1/-1; padding: 80px 0;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            color: var(--text3);
        }
        .spin {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2.5px solid #e8eaed;
            border-top-color: var(--accent);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .st { font-size: 0.88rem; }
        .retry {
            padding: 10px 24px; background: var(--accent);
            border: none; color: #fff; border-radius: 100px;
            cursor: pointer; font-size: 0.85rem; font-weight: 600;
            box-shadow: 0 2px 10px rgba(79,110,247,0.3);
        }

        /* ===== 直播页 ===== */
        .live-page { display: none; }
        .live-page.on { display: block; }
        .live-row { margin-bottom: 28px; }
        .live-title {
            font-size: 0.95rem; font-weight: 700;
            color: var(--text); margin-bottom: 14px;
            display: flex; align-items: center; gap: 8px;
        }
        .live-title .bar {
            width: 4px; height: 18px; border-radius: 2px;
            background: var(--live);
        }
        .live-title.blue .bar { background: var(--accent); }
        .live-title.kids .bar { background: #f59e0b; }
        .live-count { font-size: 0.72rem; color: var(--text3); font-weight: 400; margin-left: 4px; }
        .live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
        }
        .lcard {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px 10px 16px;
            text-align: center; cursor: pointer; transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .lcard:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border-color: rgba(239,68,68,0.2);
        }
        .lcard:active { transform: scale(0.97); }
        .lemo { font-size: 2.2rem; margin-bottom: 8px; display: block; }
        .lname { font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 8px; }
        .ltag {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 3px 10px; border-radius: 100px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.15);
            font-size: 0.65rem; color: var(--live); font-weight: 700;
        }
        .ltag::before {
            content: ''; width: 5px; height: 5px; border-radius: 50%;
            background: var(--live); animation: bl 1.2s infinite;
        }
        @keyframes bl { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ===== 播放器 ===== */
        .player {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 500; flex-direction: column;
        }
        .player.on { display: flex; }
        .pbar {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px; background: #111;
            border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
        }
        .back {
            display: flex; align-items: center; gap: 5px;
            background: rgba(255,255,255,0.1); border: none;
            color: #ccc; padding: 7px 14px; border-radius: 8px;
            cursor: pointer; font-size: 0.82rem; font-family: inherit;
            transition: background 0.2s;
        }
        .back:hover { background: rgba(255,255,255,0.18); color: #fff; }
        .pttl {
            flex: 1; font-size: 0.88rem; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: #ccc;
        }
        .pbody { flex: 1; display: flex; align-items: center; justify-content: center; }
        .pbody iframe { width: 100%; height: 100%; border: none; }

        /* ===== 底部导航 ===== */
        .bnav {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
            background: var(--bnav-bg);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex; padding: 6px 0 max(6px, env(safe-area-inset-bottom));
        }
        .bnav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 2px; cursor: pointer;
            color: var(--text3); padding: 5px 0; transition: color 0.2s;
        }
        .bnav-item.on { color: var(--accent); }
        .bnav-item:active { opacity: 0.7; }
        .bni { font-size: 1.3rem; }
        .bnl { font-size: 0.6rem; font-weight: 500; }

        /* 响应式 */
        @media (max-width: 768px) {
            .top { padding: 0 16px; }
            .top-inner { height: 58px; gap: 12px; }
            .brand { font-size: 1.1rem; }
            .search-bar { max-width: none; }
            .page { padding: 16px 16px 90px; }
            .grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .live-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .lcard { padding: 14px 6px 12px; }
            .lemo { font-size: 1.8rem; }
        }
        @media (min-width: 1100px) {
            .grid { grid-template-columns: repeat(5, 1fr); }
        }
    </style>
</head>
<body>

<!-- 顶部 -->
<div class="top">
    <div class="top-inner">
        <div class="brand">童<b>真</b>阁</div>
        <div class="search-bar">
            <input type="text" id="si" placeholder="搜索视频、UP主..." onkeydown="if(event.key==='Enter')search()">
            <button onclick="search()">🔍</button>
        </div>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
    </div>
    <div class="tabs" id="tabs">
        <div class="tab on" onclick="tab(this,0)">🔥 热门</div>
        <div class="tab" onclick="tabLive(this)">📡 直播</div>
        <div class="tab" onclick="tab(this,138)">😂 搞笑</div>
        <div class="tab" onclick="tab(this,129)">💃 美女</div>
        <div class="tab" onclick="tab(this,1)">🎌 动漫</div>
        <div class="tab" onclick="tab(this,4)">🎮 游戏</div>
        <div class="tab" onclick="tab(this,3)">🎵 音乐</div>
        <div class="tab" onclick="tab(this,160)">🌟 生活</div>
        <div class="tab" onclick="tab(this,188)">👶 儿童</div>
        <div class="tab" onclick="tab(this,223)">🍜 美食</div>
        <div class="tab" onclick="tab(this,217)">🏆 体育</div>
    </div>
</div>

<!-- 内容 -->
<div class="page" id="mainPage">
    <div class="page-title"><div class="dot"></div>推荐视频</div>
    <div class="grid" id="grid"></div>
</div>

<!-- 直播页 -->
<div class="page live-page" id="livePageEl">
    <div class="live-row">
        <div class="live-title"><div class="bar"></div>央视频道<div class="live-count">12个频道</div></div>
        <div class="live-grid" id="cg"></div>
    </div>
    <div class="live-row">
        <div class="live-title blue"><div class="bar"></div>卫视频道<div class="live-count">12个频道</div></div>
        <div class="live-grid" id="sg"></div>
    </div>
    <div class="live-row">
        <div class="live-title kids"><div class="bar"></div>少儿动画<div class="live-count">8个频道</div></div>
        <div class="live-grid" id="kg"></div>
    </div>
</div>

<!-- 播放器 -->
<div class="player" id="player">
    <div class="pbar">
        <button class="back" onclick="closeP()">← 返回</button>
        <div class="pttl" id="pttl"></div>
    </div>
    <div class="pbody">
        <iframe id="pfr" allowfullscreen allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
</div>

<!-- 底部导航 -->
<div class="bnav">
    <div class="bnav-item on" id="b0" onclick="tabB(0,'b0')"><span class="bni">🔥</span><span class="bnl">热门</span></div>
    <div class="bnav-item" id="b1" onclick="tabLB('b1')"><span class="bni">📡</span><span class="bnl">直播</span></div>
    <div class="bnav-item" id="b2" onclick="tabB(138,'b2')"><span class="bni">😂</span><span class="bnl">搞笑</span></div>
    <div class="bnav-item" id="b3" onclick="tabB(129,'b3')"><span class="bni">💃</span><span class="bnl">美女</span></div>
    <div class="bnav-item" id="b4" onclick="tabB(1,'b4')"><span class="bni">🎌</span><span class="bnl">动漫</span></div>
</div>

<script>
// ===== B站 API =====
let tid = 0, pg = 1, busy = false;

const N = n => !n ? '0' : n >= 10000 ? (n/10000).toFixed(1)+'万' : n;
const D = s => !s ? '' : Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

async function fetchBili(t, p=1) {
    const path = t===0
        ? `/x/web-interface/popular?ps=40&pn=${p}`
        : `/x/web-interface/newlist?rid=${t}&ps=40&pn=${p}&type=0`;
    const url = 'https://api.bilibili.com' + path;

    // 依次尝试三个代理
    const proxies = [
        () => fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, {signal: AbortSignal.timeout(10000)})
              .then(r=>r.json()).then(d=>JSON.parse(d.contents)),
        () => fetch(`https://corsproxy.io/?${encodeURIComponent(url)}`, {signal: AbortSignal.timeout(10000)})
              .then(r=>r.json()),
        () => fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`, {signal: AbortSignal.timeout(10000)})
              .then(r=>r.json()),
    ];

    for (const proxy of proxies) {
        try {
            const j = await proxy();
            if (j?.code === 0) return t===0 ? (j.data?.list||[]) : (j.data?.archives||[]);
        } catch {}
    }
    throw new Error('加载失败');
}

function itemCard(v) {
    const t = (v.title||'').replace(/['"<>]/g,'');
    const pic = v.pic || '';
    const img = pic ? `<img src="${pic}@320w_200h" loading="lazy" onerror="this.parentNode.style.background='#f0f2f5'">` : '';
    return `<div class="item" onclick="play('${v.bvid}','${t}')">
        <div class="thumb">${img}
            <div class="play"><div class="play-inner">▶</div></div>
            <div class="vdur">${D(v.duration)}</div>
        </div>
        <div class="detail">
            <div class="vtitle">${v.title}</div>
            <div class="vmeta">
                <div class="vup">${v.owner?.name||''}</div>
                <div class="vv">👁 ${N(v.stat?.view)}</div>
            </div>
        </div>
    </div>`;
}

function render(list, add=false) {
    const g = document.getElementById('grid');
    if (!add) g.innerHTML = '';
    if (!list.length && !add) {
        g.innerHTML = '<div class="state"><div class="st">暂无内容</div></div>';
        return;
    }
    g.insertAdjacentHTML('beforeend', list.map(itemCard).join(''));
}

async function loadTab(t, el, p=1) {
    tid = t; pg = 1;
    const g = document.getElementById('grid');
    if (!add) g.innerHTML = '<div class="state"><div class="spin"></div><div class="st">加载中...</div></div>';
    try {
        const list = await fetchBili(t, 1);
        render(list);
    } catch(e) {
        g.innerHTML = `<div class="state"><div class="st">加载失败，请检查网络</div><button class="retry" onclick="loadTab(${t},null,1)">重新加载</button></div>`;
    }
}

function tab(el, t) {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
    if(el) el.classList.add('on');
    document.getElementById('mainPage').style.display = 'block';
    document.getElementById('livePageEl').classList.remove('on');
    document.getElementById('grid').innerHTML = '<div class="state"><div class="spin"></div><div class="st">加载中...</div></div>';
    tid = t; pg = 1;
    fetchBili(t,1).then(render).catch(()=>{
        document.getElementById('grid').innerHTML = `<div class="state"><div class="st">加载失败</div><button class="retry" onclick="tab(null,${t})">重试</button></div>`;
    });
}

function tabB(t, id) {
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
    document.getElementById(id)?.classList.add('on');
    // 同步顶部tab
    const topTabs = document.querySelectorAll('.tab');
    const tidMap = [0,'live',138,129,1,'game','music',160,188,223,217];
    topTabs.forEach((b,i)=>b.classList.toggle('on', tidMap[i]===t));
    tab(null, t);
}

function tabLive(el) {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    if(el) el.classList.add('on');
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('livePageEl').classList.add('on');
    document.getElementById('cg').innerHTML = CCTV.map(lc).join('');
    document.getElementById('sg').innerHTML = SAT.map(lc).join('');
    document.getElementById('kg').innerHTML = KIDS.map(lc).join('');
}

function tabLB(id) {
    document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('on'));
    document.getElementById(id)?.classList.add('on');
    document.querySelectorAll('.tab')[1]?.classList.add('on');
    document.getElementById('mainPage').style.display = 'none';
    document.getElementById('livePageEl').classList.add('on');
    document.getElementById('cg').innerHTML = CCTV.map(lc).join('');
    document.getElementById('sg').innerHTML = SAT.map(lc).join('');
    document.getElementById('kg').innerHTML = KIDS.map(lc).join('');
}

function play(bvid, title) {
    document.getElementById('pttl').textContent = title;
    // 1080P 高清播放
    document.getElementById('pfr').src = `https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=1&high_quality=1&danmaku=0&qn=80`;
    document.getElementById('player').classList.add('on');
    document.body.style.overflow = 'hidden';
}

function closeP() {
    document.getElementById('player').classList.remove('on');
    document.getElementById('pfr').src = '';
    document.body.style.overflow = '';
}

function search() {
    const q = document.getElementById('si').value.trim();
    if(q) window.open('https://search.bilibili.com/all?keyword='+encodeURIComponent(q),'_blank');
}

// 无限滚动
window.addEventListener('scroll', async () => {
    if(busy) return;
    if(document.getElementById('livePageEl').classList.contains('on')) return;
    if(window.innerHeight+window.scrollY >= document.body.offsetHeight-500) {
        busy = true; pg++;
        try { render(await fetchBili(tid, pg), true); } catch {}
        busy = false;
    }
});

// 直播数据
const CCTV=[
    {n:'CCTV-1 综合',e:'📺',u:'https://www.yangshipin.cn/tv/home?cid=568'},
    {n:'CCTV-2 财经',e:'💰',u:'https://www.yangshipin.cn/tv/home?cid=569'},
    {n:'CCTV-3 综艺',e:'🎭',u:'https://www.yangshipin.cn/tv/home?cid=570'},
    {n:'CCTV-4 中文',e:'🌏',u:'https://www.yangshipin.cn/tv/home?cid=571'},
