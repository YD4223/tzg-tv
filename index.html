<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>童真阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0d0d1a; color: #fff; min-height: 100vh;
        }

        /* 顶部 */
        .header {
            background: linear-gradient(135deg, #1a0533, #0d0d1a);
            padding: 14px 16px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            position: sticky; top: 0; z-index: 100;
        }
        .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .logo {
            font-size: 1.4rem; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .search-wrap {
            flex: 1; display: flex; gap: 8px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 8px 14px;
        }
        .search-wrap input {
            flex: 1; background: none; border: none;
            color: #fff; font-size: 0.88rem; outline: none;
        }
        .search-wrap input::placeholder { color: #444; }
        .search-wrap button { background: none; border: none; color: #888; cursor: pointer; }

        /* 分类导航 */
        .nav-bar {
            display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px;
        }
        .nav-bar::-webkit-scrollbar { display: none; }
        .nav-btn {
            padding: 6px 14px; border-radius: 16px; font-size: 0.82rem;
            cursor: pointer; white-space: nowrap; flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.08);
            color: #777; background: rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .nav-btn.active {
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border-color: transparent; color: #fff;
            box-shadow: 0 3px 12px rgba(124,58,237,0.4);
        }

        /* 主内容 */
        .main { padding: 16px; padding-bottom: 80px; }

        /* 视频网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
        }
        .video-card {
            cursor: pointer; border-radius: 10px; overflow: hidden;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        .video-card:hover { transform: translateY(-3px); border-color: rgba(124,58,237,0.4); }
        .video-thumb {
            width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden;
            background: #1a1a2e;
        }
        .video-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .video-thumb .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s;
        }
        .video-card:hover .overlay { opacity: 1; }
        .play-btn { font-size: 2.2rem; }
        .duration {
            position: absolute; bottom: 5px; right: 6px;
            background: rgba(0,0,0,0.8); padding: 1px 5px;
            border-radius: 3px; font-size: 0.68rem;
        }
        .video-info { padding: 9px 10px; }
        .video-title {
            font-size: 0.8rem; line-height: 1.4; color: #ddd;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;
        }
        .video-meta { display: flex; justify-content: space-between; }
        .video-up { font-size: 0.7rem; color: #666; }
        .video-view { font-size: 0.7rem; color: #555; }

        /* 加载/错误 */
        .loading, .error-box {
            grid-column: 1/-1; padding: 50px 20px;
            text-align: center; color: #555;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px; border-radius: 50%;
            border: 3px solid rgba(124,58,237,0.2);
            border-top-color: #7c3aed;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .retry-btn {
            padding: 9px 20px; background: #7c3aed; border: none;
            color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.88rem;
        }

        /* 播放弹窗 */
        .player-modal {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 200; flex-direction: column;
        }
        .player-modal.show { display: flex; }
        .player-bar {
            padding: 12px 16px; background: rgba(0,0,0,0.9);
            display: flex; align-items: center; gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .back-btn {
            background: rgba(255,255,255,0.1); border: none;
            color: #fff; padding: 7px 16px; border-radius: 8px;
            cursor: pointer; font-size: 0.88rem;
        }
        .player-name { flex: 1; font-size: 0.9rem; font-weight: 600; }
        .player-wrap { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
        .player-wrap iframe { width: 100%; max-width: 960px; aspect-ratio: 16/9; border: none; }

        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(8,8,18,0.97);
            border-top: 1px solid rgba(255,255,255,0.07);
            padding: 6px 0;
        }
        .bottom-items { display: flex; justify-content: space-around; }
        .bottom-item {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; padding: 5px 10px; cursor: pointer; color: #555;
            transition: color 0.2s; font-size: 0;
        }
        .bottom-item.active { color: #7c3aed; }
        .bi { font-size: 1.3rem; }
        .bl { font-size: 0.62rem; }

        @media (max-width: 480px) {
            .video-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }

        /* 直播 */
        .live-section { margin-bottom: 24px; }
        .live-title {
            font-size: 1rem; font-weight: 700; margin-bottom: 12px;
            display: flex; align-items: center; gap: 8px;
        }
        .live-title::before {
            content: ''; width: 4px; height: 16px;
            background: linear-gradient(180deg, #ff6b6b, #f97316);
            border-radius: 2px;
        }
        .live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px;
        }
        .live-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 12px; padding: 16px 10px;
            text-align: center; cursor: pointer; transition: all 0.2s;
        }
        .live-card:hover { transform: translateY(-3px); border-color: rgba(255,107,107,0.4); background: rgba(255,107,107,0.08); }
        .live-icon { font-size: 2.2rem; margin-bottom: 7px; }
        .live-name { font-size: 0.82rem; font-weight: 600; margin-bottom: 5px; }
        .live-badge {
            display: inline-block; padding: 2px 8px;
            background: #ff4444; border-radius: 10px;
            font-size: 0.65rem; font-weight: 700;
            animation: lp 1.5s infinite;
        }
        @keyframes lp { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>

<div class="header">
    <div class="header-top">
        <div class="logo">童真阁</div>
        <div class="search-wrap">
            <input type="text" id="searchInput" placeholder="搜索视频..." onkeydown="if(event.key==='Enter')doSearch()">
            <button onclick="doSearch()">🔍</button>
        </div>
    </div>
    <div class="nav-bar" id="navBar">
        <div class="nav-btn active" onclick="loadTab(this,0,'热门')">🔥 热门</div>
        <div class="nav-btn" onclick="showLive(this)">📡 直播</div>
        <div class="nav-btn" onclick="loadTab(this,138,'搞笑')">😂 搞笑</div>
        <div class="nav-btn" onclick="loadTab(this,129,'美女')">💃 美女</div>
        <div class="nav-btn" onclick="loadTab(this,1,'动漫')">🎌 动漫</div>
        <div class="nav-btn" onclick="loadTab(this,4,'游戏')">🎮 游戏</div>
        <div class="nav-btn" onclick="loadTab(this,3,'音乐')">🎵 音乐</div>
        <div class="nav-btn" onclick="loadTab(this,160,'生活')">🌟 生活</div>
        <div class="nav-btn" onclick="loadTab(this,188,'儿童')">👶 儿童</div>
        <div class="nav-btn" onclick="loadTab(this,223,'美食')">🍜 美食</div>
        <div class="nav-btn" onclick="loadTab(this,217,'体育')">🏆 体育</div>
    </div>
</div>

<div class="main">
    <div class="video-grid" id="videoGrid">
        <div class="loading"><div class="spinner"></div><span>加载中...</span></div>
    </div>

    <!-- 直播页 -->
    <div id="livePage" style="display:none">
        <div class="live-section">
            <div class="live-title">📺 央视频道</div>
            <div class="live-grid" id="cctvGrid"></div>
        </div>
        <div class="live-section">
            <div class="live-title">📡 卫视频道</div>
            <div class="live-grid" id="satGrid"></div>
        </div>
    </div>
</div>

<!-- 播放器 -->
<div class="player-modal" id="playerModal">
    <div class="player-bar">
        <button class="back-btn" onclick="closePlayer()">← 返回</button>
        <div class="player-name" id="playerName"></div>
    </div>
    <div class="player-wrap">
        <iframe id="playerFrame" allowfullscreen allow="autoplay; fullscreen"></iframe>
    </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
    <div class="bottom-items">
        <div class="bottom-item active" onclick="loadTabByTid(0,'热门')">
            <span class="bi">🔥</span><span class="bl">热门</span>
        </div>
        <div class="bottom-item" onclick="loadTabByTid(138,'搞笑')">
            <span class="bi">😂</span><span class="bl">搞笑</span>
        </div>
        <div class="bottom-item" onclick="loadTabByTid(129,'美女')">
            <span class="bi">💃</span><span class="bl">美女</span>
        </div>
        <div class="bottom-item" onclick="loadTabByTid(1,'动漫')">
            <span class="bi">🎌</span><span class="bl">动漫</span>
        </div>
        <div class="bottom-item" onclick="loadTabByTid(4,'游戏')">
            <span class="bi">🎮</span><span class="bl">游戏</span>
        </div>
    </div>
</div>

<script>
    const COOKIE = 'enable_web_push=DISABLE; header_theme_version=CLOSE; enable_feed_channel=ENABLE; hit-dyn-v2=1; buvid3=B2116878-753F-06F3-05D8-83A3572DC45435735infoc; b_nut=1758437535; _uuid=83351DED-9ECF-31E8-EFF3-284B21016CB9E36305infoc; theme-tip-show=SHOWED; buvid4=8F966EDE-5CE9-44CA-EE1A-E53CABEBC6C037144-025092114-bvjbNbmSvI3nU3q75tJhVg%3D%3D; buvid_fp=2a75a330aed8d0f332419bf6b553f880; rpdid=|(um~k)Yum~J0J\'u~l)RJ~lRY; theme-avatar-tip-show=SHOWED; fingerprint=2a75a330aed8d0f332419bf6b553f880; CURRENT_QUALITY=80; bp_t_offset_1949694887=1174684945709268992; b_lsid=C8D89F9F_19D277868C5; bmg_af_switch=1; bmg_src_def_domain=i1.hdslb.com; bili_ticket=eyJhbGciOiJIUzI1NiIsImtpZCI6InMwMyIsInR5cCI6IkpXVCJ9.eyJleHAiOjE3NzQ3NDI4OTcsImlhdCI6MTc3NDQ4MzYzNywicGx0IjotMX0.5tyqysTHKGLILHgdq7eByX5-ZQ_OGYDMo7HWZVP_bRU; bili_ticket_expires=1774742837; SESSDATA=67221a53%2C1790035718%2Cd6096%2A32CjCzFMN2Jyhmw5OrgNSFwgs6mXtNyRu2pKe2xOoykjZR7YHg8eYlWlgQai5vLT01ZacSVjROY0ZsZlJvOFZDZzFaWDdyLVdIT0pkdURENllWb0p2Q3dPbE9OOTBuYmxGM29QOWNhUGd5T21pbnB5MzNEdmQ4OWladUNSX0ttdTJrSmtCNTZpYmxRIIEC; bili_jct=01fbe5b89ad687a9aeb5664955fc4016; DedeUserID=1949694887; DedeUserID__ckMd5=fbb6b9d1811d09f5; CURRENT_FNVAL=2000; sid=6wz3g2o6; home_feed_column=4; browser_resolution=231-760';

    const PROXY = 'https://api.allorigins.win/get?url=';
    let currentTid = 0;
    let currentPage = 1;
    let loading = false;

    function fmt(n) {
        if (!n) return '0';
        if (n >= 10000) return (n/10000).toFixed(1) + '万';
        return n;
    }
    function fmtDur(s) {
        if (!s) return '';
        return Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }

    async function fetchVideos(tid, page = 1) {
        let url;
        if (tid === 0) {
            url = `https://api.bilibili.com/x/web-interface/popular?ps=20&pn=${page}`;
        } else {
            url = `https://api.bilibili.com/x/web-interface/newlist?rid=${tid}&ps=20&pn=${page}&type=0`;
        }
        const res = await fetch(PROXY + encodeURIComponent(url), {
            headers: { 'Cookie': COOKIE }
        });
        const data = await res.json();
        const json = JSON.parse(data.contents);
        if (tid === 0) return json.data?.list || [];
        return json.data?.archives || [];
    }

    function renderCards(videos, append = false) {
        const grid = document.getElementById('videoGrid');
        if (!append) grid.innerHTML = '';

        const html = videos.map(v => `
            <div class="video-card" onclick="playVideo('${v.bvid}','${(v.title||'').replace(/'/g,"\\'")}')">
                <div class="video-thumb">
                    <img src="${v.pic}@320w_200h.webp" loading="lazy"
                        onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22320%22 height=%22180%22><rect fill=%22%231a1a2e%22 width=%22320%22 height=%22180%22/><text x=%22160%22 y=%2295%22 text-anchor=%22middle%22 fill=%22%23333%22 font-size=%2248%22>🎬</text></svg>'">
                    <div class="overlay"><span class="play-btn">▶</span></div>
                    <div class="duration">${fmtDur(v.duration)}</div>
                </div>
                <div class="video-info">
                    <div class="video-title">${v.title}</div>
                    <div class="video-meta">
                        <span class="video-up">${v.owner?.name || ''}</span>
                        <span class="video-view">👁 ${fmt(v.stat?.view)}</span>
                    </div>
                </div>
            </div>
        `).join('');

        grid.insertAdjacentHTML('beforeend', html);
    }

    async function loadTab(el, tid, name) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        // 隐藏直播页，显示视频网格
        document.getElementById('livePage').style.display = 'none';
        document.getElementById('videoGrid').style.display = 'grid';
        currentTid = tid;
        currentPage = 1;
        document.getElementById('videoGrid').innerHTML = '<div class="loading"><div class="spinner"></div><span>加载中...</span></div>';
        try {
            const videos = await fetchVideos(tid, 1);
            renderCards(videos);
        } catch(e) {
            document.getElementById('videoGrid').innerHTML = `
                <div class="error-box">
                    <span>😅 加载失败，请重试</span>
                    <button class="retry-btn" onclick="loadTab(null,${tid},'${name}')">重新加载</button>
                </div>`;
        }
    }

    function loadTabByTid(tid, name) {
        const btns = document.querySelectorAll('.nav-btn');
        const tids = [0,138,129,1,4,3,160,188,223,217];
        btns.forEach((b,i) => b.classList.toggle('active', tids[i] === tid));
        loadTab(null, tid, name);
    }

    function playVideo(bvid, title) {
        document.getElementById('playerName').textContent = title;
        document.getElementById('playerFrame').src = `https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=1&high_quality=1&danmaku=0`;
        document.getElementById('playerModal').classList.add('show');
        document.body.style.overflow = 'hidden';
    }

    function closePlayer() {
        document.getElementById('playerModal').classList.remove('show');
        document.getElementById('playerFrame').src = '';
        document.body.style.overflow = '';
    }

    function doSearch() {
        const q = document.getElementById('searchInput').value.trim();
        if (!q) return;
        window.open('https://search.bilibili.com/all?keyword=' + encodeURIComponent(q), '_blank');
    }

    // 下拉加载更多
    window.addEventListener('scroll', async () => {
        if (loading) return;
        if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
            loading = true;
            currentPage++;
            try {
                const videos = await fetchVideos(currentTid, currentPage);
                renderCards(videos, true);
            } catch(e) {}
            loading = false;
        }
    });

    // 初始加载
    loadTab(null, 0, '热门');

    // 直播数据
    const CCTV = [
        {name:'CCTV-1 综合',icon:'📺',url:'https://tv.cctv.com/live/cctv1/'},
        {name:'CCTV-2 财经',icon:'💰',url:'https://tv.cctv.com/live/cctv2/'},
        {name:'CCTV-3 综艺',icon:'🎭',url:'https://tv.cctv.com/live/cctv3/'},
        {name:'CCTV-4 中文',icon:'🌏',url:'https://tv.cctv.com/live/cctv4/'},
        {name:'CCTV-5 体育',icon:'⚽',url:'https://tv.cctv.com/live/cctv5/'},
        {name:'CCTV-6 电影',icon:'🎬',url:'https://tv.cctv.com/live/cctv6/'},
        {name:'CCTV-7 国防',icon:'🌾',url:'https://tv.cctv.com/live/cctv7/'},
        {name:'CCTV-8 电视剧',icon:'🎞️',url:'https://tv.cctv.com/live/cctv8/'},
        {name:'CCTV-9 纪录',icon:'📽️',url:'https://tv.cctv.com/live/cctv9/'},
        {name:'CCTV-10 科教',icon:'🔬',url:'https://tv.cctv.com/live/cctv10/'},
        {name:'CCTV-11 戏曲',icon:'🎎',url:'https://tv.cctv.com/live/cctv11/'},
        {name:'CCTV-12 社会',icon:'⚖️',url:'https://tv.cctv.com/live/cctv12/'},
    ];
    const SAT = [
        {name:'湖南卫视',icon:'🌟',url:'https://www.mgtv.com/live/1/'},
        {name:'浙江卫视',icon:'🏊',url:'https://www.zjstv.com/live/'},
        {name:'江苏卫视',icon:'💫',url:'https://www.jstv.com/live/'},
        {name:'东方卫视',icon:'🌆',url:'https://www.dragontv.cn/live/'},
        {name:'北京卫视',icon:'🏛️',url:'https://www.btv.com.cn/live/'},
        {name:'广东卫视',icon:'🌺',url:'https://www.gdtv.cn/live/'},
        {name:'安徽卫视',icon:'🎪',url:'https://www.ahtv.cn/live/'},
        {name:'深圳卫视',icon:'🏙️',url:'https://www.szmg.com.cn/live/'},
    ];

    function showLive(el) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        document.getElementById('videoGrid').style.display = 'none';
        document.getElementById('livePage').style.display = 'block';

        document.getElementById('cctvGrid').innerHTML = CCTV.map(c => `
            <div class="live-card" onclick="window.open('${c.url}','_blank')">
                <div class="live-icon">${c.icon}</div>
                <div class="live-name">${c.name}</div>
                <div class="live-badge">● 直播</div>
            </div>`).join('');

        document.getElementById('satGrid').innerHTML = SAT.map(c => `
            <div class="live-card" onclick="window.open('${c.url}','_blank')">
                <div class="live-icon">${c.icon}</div>
                <div class="live-name">${c.name}</div>
                <div class="live-badge">● 直播</div>
            </div>`).join('');
    }

    // 重写loadTab，切换时隐藏直播页
    const _origLoadTab = loadTab;
    
</script>
</body>
</html>
