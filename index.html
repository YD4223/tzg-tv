<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>童真阁</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
            background: #111318;
            color: #f0f0f0;
            min-height: 100vh;
        }

        /* ===== 顶部 ===== */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: #111318;
            border-bottom: 1px solid #1e2028;
            padding: 14px 16px 0;
        }

        .header-row {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 12px;
        }

        .logo {
            font-size: 1.2rem; font-weight: 700;
            color: #fff; letter-spacing: 1px;
            white-space: nowrap;
        }
        .logo span {
            color: #6366f1;
        }

        .search {
            flex: 1; display: flex; align-items: center; gap: 8px;
            background: #1e2028; border-radius: 10px;
            padding: 9px 14px; border: 1px solid #2a2d38;
            transition: border-color 0.2s;
        }
        .search:focus-within { border-color: #6366f1; }
        .search input {
            flex: 1; background: none; border: none;
            color: #f0f0f0; font-size: 0.88rem; outline: none;
        }
        .search input::placeholder { color: #4a4d5a; }
        .search-btn { color: #4a4d5a; cursor: pointer; font-size: 0.9rem; border: none; background: none; }
        .search:focus-within .search-btn { color: #6366f1; }

        /* 分类 */
        .tabs {
            display: flex; gap: 4px; overflow-x: auto;
            padding-bottom: 12px;
        }
        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 6px 14px; border-radius: 8px;
            font-size: 0.82rem; font-weight: 500;
            cursor: pointer; white-space: nowrap; flex-shrink: 0;
            color: #6b7280; background: transparent;
            transition: all 0.2s; border: none;
        }
        .tab:hover { color: #d1d5db; background: #1e2028; }
        .tab.active {
            background: #6366f1;
            color: #fff;
        }

        /* ===== 内容区 ===== */
        .content { padding: 16px; padding-bottom: 80px; }

        /* 视频网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
            gap: 14px;
        }

        .card {
            cursor: pointer; border-radius: 10px; overflow: hidden;
            background: #1a1d24;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        .card:active { transform: scale(0.98); }

        .thumb {
            width: 100%; aspect-ratio: 16/9;
            position: relative; overflow: hidden;
            background: #1e2028;
        }
        .thumb img {
            width: 100%; height: 100%; object-fit: cover;
            display: block; transition: transform 0.3s;
        }
        .card:hover .thumb img { transform: scale(1.04); }

        .play-mask {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.35);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.2s;
        }
        .card:hover .play-mask { opacity: 1; }
        .play-icon {
            width: 42px; height: 42px; border-radius: 50%;
            background: rgba(255,255,255,0.92);
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; padding-left: 3px; color: #111;
        }

        .dur {
            position: absolute; bottom: 6px; right: 7px;
            background: rgba(0,0,0,0.75);
            padding: 2px 6px; border-radius: 4px;
            font-size: 0.68rem; color: #fff; font-weight: 500;
        }

        .info { padding: 10px 10px 11px; }
        .title {
            font-size: 0.8rem; line-height: 1.45; color: #e2e8f0;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
            margin-bottom: 7px;
        }
        .meta {
            display: flex; align-items: center; justify-content: space-between;
        }
        .up { font-size: 0.7rem; color: #6b7280; }
        .views { font-size: 0.7rem; color: #6b7280; }

        /* 加载/错误 */
        .state {
            grid-column: 1/-1; padding: 60px 0;
            display: flex; flex-direction: column; align-items: center; gap: 14px;
            color: #4a4d5a;
        }
        .spin {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2.5px solid #2a2d38;
            border-top-color: #6366f1;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .state-text { font-size: 0.85rem; }
        .retry {
            padding: 9px 22px; background: #6366f1;
            border: none; color: #fff; border-radius: 8px;
            cursor: pointer; font-size: 0.85rem;
        }

        /* ===== 直播页 ===== */
        .live-wrap { display: none; }
        .live-section { margin-bottom: 28px; }
        .sec-title {
            font-size: 0.88rem; font-weight: 600; color: #9ca3af;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 12px; padding-left: 2px;
        }
        .live-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 10px;
        }
        .live-card {
            background: #1a1d24; border-radius: 10px;
            padding: 16px 8px 13px; text-align: center;
            cursor: pointer; transition: all 0.2s;
            border: 1px solid #1e2028;
        }
        .live-card:hover {
            background: #1e2028; border-color: #6366f1;
            transform: translateY(-2px);
        }
        .live-card:active { transform: scale(0.97); }
        .live-em { font-size: 1.8rem; margin-bottom: 7px; display: block; }
        .live-nm { font-size: 0.75rem; font-weight: 600; color: #d1d5db; margin-bottom: 6px; }
        .live-tag {
            display: inline-flex; align-items: center; gap: 3px;
            font-size: 0.6rem; color: #f87171;
            background: rgba(239,68,68,0.1);
            padding: 2px 7px; border-radius: 6px;
        }
        .live-dot {
            width: 4px; height: 4px; border-radius: 50%;
            background: #ef4444; animation: blink 1.2s infinite;
        }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

        /* ===== 播放器 ===== */
        .player {
            display: none; position: fixed; inset: 0;
            background: #000; z-index: 500; flex-direction: column;
        }
        .player.show { display: flex; }

        .player-bar {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px; background: #111318;
            border-bottom: 1px solid #1e2028; flex-shrink: 0;
        }
        .back {
            display: flex; align-items: center; gap: 5px;
            background: #1e2028; border: none; color: #d1d5db;
            padding: 7px 14px; border-radius: 8px;
            cursor: pointer; font-size: 0.82rem; font-family: inherit;
            transition: background 0.2s;
        }
        .back:hover { background: #2a2d38; }
        .player-ttl {
            flex: 1; font-size: 0.88rem; font-weight: 500;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            color: #e2e8f0;
        }
        .player-body {
            flex: 1; display: flex; align-items: center; justify-content: center;
        }
        .player-body iframe {
            width: 100%; height: 100%; border: none;
        }

        /* ===== 底部导航 ===== */
        .nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #111318; border-top: 1px solid #1e2028;
            display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 3px;
            cursor: pointer; color: #4a4d5a;
            transition: color 0.2s; padding: 4px 0;
        }
        .nav-item.on { color: #6366f1; }
        .nav-item:active { opacity: 0.7; }
        .ni { font-size: 1.25rem; }
        .nl { font-size: 0.6rem; font-weight: 500; }

        @media (max-width: 480px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .live-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (min-width: 900px) {
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .content { padding: 20px 28px 90px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-row">
        <div class="logo">童<span>真</span>阁</div>
        <div class="search">
            <input type="text" id="si" placeholder="搜索视频、UP主..." onkeydown="if(event.key==='Enter')search()">
            <button class="search-btn" onclick="search()">搜索</button>
        </div>
    </div>
    <div class="tabs" id="tabs">
        <button class="tab active" onclick="go(this,0)">🔥 热门</button>
        <button class="tab" onclick="goLive(this)">📡 直播</button>
        <button class="tab" onclick="go(this,138)">😂 搞笑</button>
        <button class="tab" onclick="go(this,129)">💃 美女</button>
        <button class="tab" onclick="go(this,1)">🎌 动漫</button>
        <button class="tab" onclick="go(this,4)">🎮 游戏</button>
        <button class="tab" onclick="go(this,3)">🎵 音乐</button>
        <button class="tab" onclick="go(this,160)">🌟 生活</button>
        <button class="tab" onclick="go(this,188)">👶 儿童</button>
        <button class="tab" onclick="go(this,223)">🍜 美食</button>
        <button class="tab" onclick="go(this,217)">🏆 体育</button>
    </div>
</div>

<div class="content">
    <div class="grid" id="grid">
        <div class="state"><div class="spin"></div><div class="state-text">加载中...</div></div>
    </div>
    <div class="live-wrap" id="liveWrap">
        <div class="live-section">
            <div class="sec-title">央视频道</div>
            <div class="live-grid" id="cg"></div>
        </div>
        <div class="live-section">
            <div class="sec-title">卫视频道</div>
            <div class="live-grid" id="sg"></div>
        </div>
    </div>
</div>

<!-- 播放器 -->
<div class="player" id="player">
    <div class="player-bar">
        <button class="back" onclick="closeP()">← 返回</button>
        <div class="player-ttl" id="ptitle"></div>
    </div>
    <div class="player-body">
        <iframe id="pframe" allowfullscreen allow="autoplay;fullscreen"></iframe>
    </div>
</div>

<!-- 底部导航 -->
<div class="nav">
    <div class="nav-item on" id="n0" onclick="go(null,0,'n0')"><span class="ni">🔥</span><span class="nl">热门</span></div>
    <div class="nav-item" id="n1" onclick="goLive(null,'n1')"><span class="ni">📡</span><span class="nl">直播</span></div>
    <div class="nav-item" id="n2" onclick="go(null,138,'n2')"><span class="ni">😂</span><span class="nl">搞笑</span></div>
    <div class="nav-item" id="n3" onclick="go(null,129,'n3')"><span class="ni">💃</span><span class="nl">美女</span></div>
    <div class="nav-item" id="n4" onclick="go(null,1,'n4')"><span class="ni">🎌</span><span class="nl">动漫</span></div>
</div>

<script>
let tid = 0, page = 1, busy = false;

const N = n => !n?'0':n>=10000?(n/10000).toFixed(1)+'万':n;
const D = s => !s?'':Math.floor(s/60)+':'+String(s%60).padStart(2,'0');

async function load(t, p=1) {
    // 直接请求B站API（无需代理，B站允许跨域）
    const url = t===0
        ? `https://api.bilibili.com/x/web-interface/popular?ps=40&pn=${p}`
        : `https://api.bilibili.com/x/web-interface/newlist?rid=${t}&ps=40&pn=${p}&type=0`;
    try {
        const r = await fetch(url, {
            credentials: 'include',
            headers: {
                'Referer': 'https://www.bilibili.com',
                'Origin': 'https://www.bilibili.com'
            }
        });
        const j = await r.json();
        if (j.code === 0) return t===0 ? (j.data?.list||[]) : (j.data?.archives||[]);
    } catch {}

    // 备用：通过 allorigins 代理
    try {
        const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const r = await fetch(proxy);
        const d = await r.json();
        const j = JSON.parse(d.contents);
        if (j.code === 0) return t===0 ? (j.data?.list||[]) : (j.data?.archives||[]);
    } catch {}

    throw new Error('failed');
}

function card(v) {
    const t = (v.title||'').replace(/['"<>]/g,'');
    return `<div class="card" onclick="play('${v.bvid}','${t}')">
        <div class="thumb">
            <img src="${v.pic}@320w_200h_1c.webp" loading="lazy" onerror="this.style.display='none'">
            <div class="play-mask"><div class="play-icon">▶</div></div>
            <div class="dur">${D(v.duration)}</div>
        </div>
        <div class="info">
            <div class="title">${v.title}</div>
            <div class="meta">
                <span class="up">${v.owner?.name||''}</span>
                <span class="views">👁 ${N(v.stat?.view)}</span>
            </div>
        </div>
    </div>`;
}

function render(list, add=false) {
    const g = document.getElementById('grid');
    if (!add) g.innerHTML = '';
    if (!list.length && !add) { g.innerHTML = '<div class="state"><div class="state-text">暂无内容</div></div>'; return; }
    g.insertAdjacentHTML('beforeend', list.map(card).join(''));
}

async function go(el, t, nid) {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
    if(el) el.classList.add('active');
    if(nid) document.getElementById(nid)?.classList.add('on');
    document.getElementById('grid').style.display = 'grid';
    document.getElementById('liveWrap').style.display = 'none';
    tid = t; page = 1;
    document.getElementById('grid').innerHTML = '<div class="state"><div class="spin"></div><div class="state-text">加载中...</div></div>';
    try { render(await load(t)); }
    catch { document.getElementById('grid').innerHTML = `<div class="state"><div class="state-text">加载失败</div><button class="retry" onclick="go(null,${t})">重试</button></div>`; }
}

function play(bvid, title) {
    document.getElementById('ptitle').textContent = title;
    document.getElementById('pframe').src = `https://player.bilibili.com/player.html?bvid=${bvid}&autoplay=1&high_quality=1&danmaku=0&quality=120`;
    document.getElementById('player').classList.add('show');
    document.body.style.overflow = 'hidden';
}

function closeP() {
    document.getElementById('player').classList.remove('show');
    document.getElementById('pframe').src = '';
    document.body.style.overflow = '';
}

function search() {
    const q = document.getElementById('si').value.trim();
    if(q) window.open('https://search.bilibili.com/all?keyword='+encodeURIComponent(q),'_blank');
}

window.addEventListener('scroll', async () => {
    if(busy || document.getElementById('liveWrap').style.display!=='none') return;
    if(window.innerHeight+window.scrollY >= document.body.offsetHeight-400) {
        busy=true; page++;
        try { render(await load(tid,page),true); } catch{}
        busy=false;
    }
});

// 直播
const CCTV=[
    {n:'CCTV-1',e:'📺',u:'https://www.yangshipin.cn/tv/home?cid=568'},
    {n:'CCTV-2',e:'💰',u:'https://www.yangshipin.cn/tv/home?cid=569'},
    {n:'CCTV-3',e:'🎭',u:'https://www.yangshipin.cn/tv/home?cid=570'},
    {n:'CCTV-4',e:'🌏',u:'https://www.yangshipin.cn/tv/home?cid=571'},
    {n:'CCTV-5',e:'⚽',u:'https://www.yangshipin.cn/tv/home?cid=572'},
    {n:'CCTV-6',e:'🎬',u:'https://www.yangshipin.cn/tv/home?cid=573'},
    {n:'CCTV-7',e:'🌾',u:'https://www.yangshipin.cn/tv/home?cid=574'},
    {n:'CCTV-8',e:'🎞️',u:'https://www.yangshipin.cn/tv/home?cid=575'},
    {n:'CCTV-9',e:'📽️',u:'https://www.yangshipin.cn/tv/home?cid=576'},
    {n:'CCTV-10',e:'🔬',u:'https://www.yangshipin.cn/tv/home?cid=577'},
    {n:'CCTV-11',e:'🎎',u:'https://www.yangshipin.cn/tv/home?cid=578'},
    {n:'CCTV-12',e:'⚖️',u:'https://www.yangshipin.cn/tv/home?cid=579'},
];
const SAT=[
    {n:'湖南卫视',e:'🌟',u:'https://www.yangshipin.cn/tv/home?cid=698'},
    {n:'浙江卫视',e:'🏊',u:'https://www.yangshipin.cn/tv/home?cid=702'},
    {n:'江苏卫视',e:'💫',u:'https://www.yangshipin.cn/tv/home?cid=700'},
    {n:'东方卫视',e:'🌆',u:'https://www.yangshipin.cn/tv/home?cid=703'},
    {n:'北京卫视',e:'🏛️',u:'https://www.yangshipin.cn/tv/home?cid=695'},
    {n:'广东卫视',e:'🌺',u:'https://www.yangshipin.cn/tv/home?cid=706'},
    {n:'安徽卫视',e:'🎪',u:'https://www.yangshipin.cn/tv/home?cid=704'},
    {n:'深圳卫视',e:'🏙️',u:'https://www.yangshipin.cn/tv/home?cid=707'},
    {n:'山东卫视',e:'⛰️',u:'https://www.yangshipin.cn/tv/home?cid=701'},
    {n:'四川卫视',e:'🐼',u:'https://www.yangshipin.cn/tv/home?cid=705'},
    {n:'天津卫视',e:'🎡',u:'https://www.yangshipin.cn/tv/home?cid=699'},
    {n:'辽宁卫视',e:'❄️',u:'https://www.yangshipin.cn/tv/home?cid=708'},
];

const lc = c => `<div class="live-card" onclick="window.open('${c.u}','_blank')">
    <span class="live-em">${c.e}</span>
    <div class="live-nm">${c.n}</div>
    <div class="live-tag"><div class="live-dot"></div>直播</div>
</div>`;

function goLive(el, nid) {
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('on'));
    if(el) el.classList.add('active');
    if(nid) document.getElementById(nid)?.classList.add('on');
    else document.getElementById('n1')?.classList.add('on');
    document.getElementById('grid').style.display = 'none';
    document.getElementById('liveWrap').style.display = 'block';
    document.getElementById('cg').innerHTML = CCTV.map(lc).join('');
    document.getElementById('sg').innerHTML = SAT.map(lc).join('');
    // 同步顶部tab
    document.querySelectorAll('.tab')[1]?.classList.add('active');
}

go(null, 0, 'n0');
</script>
</body>
</html>
