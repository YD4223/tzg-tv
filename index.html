        html.dark{--bg:#111318;--card:#1a1d24;--border:#22252e;--text:#f0f0f0;--text2:#9ca3af;--text3:#4b5563;--top-bg:rgba(17,19,24,0.96);--nav-bg:rgba(17,19,24,0.97);}
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
        .top{position:sticky;top:0;z-index:100;background:var(--top-bg);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;}
        .top-row{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:12px;height:60px;}
        .logo{font-size:1.2rem;font-weight:800;white-space:nowrap;}
        .logo span{color:var(--accent);}
        .search{flex:1;display:flex;gap:8px;align-items:center;}
        .search input{flex:1;padding:9px 16px;border:1.5px solid var(--border);border-radius:100px;background:var(--card);color:var(--text);font-size:0.88rem;outline:none;transition:border-color 0.2s;font-family:inherit;}
        .search input:focus{border-color:var(--accent);}
        .search input::placeholder{color:var(--text3);}
        .search button{width:36px;height:36px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;font-size:0.9rem;flex-shrink:0;}
        .theme{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border);background:var(--card);cursor:pointer;font-size:1rem;flex-shrink:0;}
        .cats{max-width:1100px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding:10px 0 12px;scrollbar-width:none;}
        .cats::-webkit-scrollbar{display:none;}
        .cat{padding:6px 16px;border-radius:100px;font-size:0.82rem;font-weight:500;cursor:pointer;white-space:nowrap;flex-shrink:0;color:var(--text2);background:transparent;border:none;transition:all 0.2s;}
        .cat:hover{background:var(--card);color:var(--text);}
        .cat.on{background:var(--accent);color:#fff;}
        .page{max-width:1100px;margin:0 auto;padding:20px 20px 90px;}
        .sec-title{font-size:0.82rem;font-weight:700;color:var(--text3);letter-spacing:1px;margin-bottom:14px;margin-top:24px;display:flex;align-items:center;gap:8px;}
        .sec-title:first-child{margin-top:0;}
        .sec-bar{width:3px;height:14px;border-radius:2px;background:var(--accent);}
        .sec-bar.red{background:var(--live);}
        .sec-bar.gold{background:#f59e0b;}
        .sec-bar.green{background:#10b981;}
        .ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;}
        .ch-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 8px 12px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;}
        .ch-card:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 6px 20px rgba(0,0,0,0.1);}
        .ch-card:active{transform:scale(0.97);}
        .ch-logo{width:48px;height:48px;border-radius:10px;object-fit:contain;margin:0 auto 8px;display:block;background:var(--bg);}
        .ch-logo-em{font-size:2rem;margin-bottom:8px;display:block;}
        .ch-name{font-size:0.78rem;font-weight:600;color:var(--text);margin-bottom:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .ch-tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:100px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);font-size:0.6rem;color:var(--live);font-weight:700;}
        .ch-tag::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--live);animation:bl 1.2s infinite;}
        .ch-hd{position:absolute;top:8px;right:8px;font-size:0.55rem;font-weight:700;padding:1px 5px;border-radius:4px;background:rgba(79,110,247,0.12);color:var(--accent);}
        @keyframes bl{0%,100%{opacity:1}50%{opacity:0.3}}
        /* 播放器 */
        .player{display:none;position:fixed;inset:0;background:#000;z-index:500;flex-direction:column;}
        .player.on{display:flex;}
        .pbar{display:flex;align-items:center;gap:12px;padding:12px 18px;background:#111;border-bottom:1px solid #222;flex-shrink:0;}
        .pback{background:rgba(255,255,255,0.1);border:none;color:#ccc;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:0.85rem;font-family:inherit;}
        .pback:hover{background:rgba(255,255,255,0.18);color:#fff;}
        .ptitle{flex:1;font-size:0.9rem;font-weight:600;color:#e0e0e0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .pstatus{font-size:0.75rem;color:#666;white-space:nowrap;}
        .pbody{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;}
        video{width:100%;height:100%;object-fit:contain;}
        .pload{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#888;pointer-events:none;}
        .pload.hide{display:none;}
        .spin{width:36px;height:36px;border:3px solid #333;border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .perr{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:#888;}
        .perr.on{display:flex;}
        .perr-icon{font-size:3rem;}
        .perr-msg{font-size:0.88rem;text-align:center;padding:0 20px;}
        .perr-retry{padding:10px 24px;background:var(--accent);border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:0.88rem;}
        /* 底部导航 */
        .bnav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:6px 0 max(6px,env(safe-area-inset-bottom));}
        .bitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;color:var(--text3);padding:5px 0;transition:color 0.2s;}
        .bitem.on{color:var(--accent);}
        .bitem:active{opacity:0.7;}
        .bi{font-size:1.25rem;}
        .bl{font-size:0.6rem;font-weight:500;}
        @media(max-width:600px){.ch-grid{grid-template-columns:repeat(3,1fr);gap:10px;}.ch-card{padding:12px 6px 10px;}}
        @media(min-width:900px){.ch-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));}}
    </style>
</head>

        </div>

    </div>
    <div class="cats">

        <div class="cat" onclick="showCat(this,'cctv')">央视</div>

<div class="page" id="mainPage"></div>
<!-- 播放器 -->
<div class="player" id="player">

        <div class="ptitle" id="ptitle"></div>
        <div class="pstatus" id="pstatus">连接中...</div>
    </div>
    <div class="pbody">

        <div class="pload" id="pload"><div class="spin"></div><div>信号加载中...</div></div>
        <div class="perr" id="perr">

    </div>
</div>
<!-- 底部导航 -->

const SECS = {
    cctv: {t:'央视频道', b:''},
    sat:  {t:'卫视频道', b:'red'},
    kids: {t:'少儿动画', b:'gold'},
    sport:{t:'体育频道', b:'green'},
    movie:{t:'影视频道', b:''},
    news: {t:'新闻频道', b:''},
};

let hls = null, curCh = null, curUrlIdx = 0;

function chCard(ch) {
    const logo = `https://live.fanmingming.cn/tv/${ch.name.replace(/CCTV-/,'CCTV').replace(/ .*/,'')}.png`;
    return `<div class="ch-card" onclick="playCh(${CHANNELS.indexOf(ch)})">
        <img class="ch-logo" src="${logo}" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span class="ch-logo-em" style="display:none">${ch.em}</span>
        <div class="ch-name">${ch.name}</div>
        <div class="ch-tag">直播中</div>
        ${ch.hd ? `<div class="ch-hd">${ch.hd}</div>` : ''}
    </div>`;
}

function renderAll() {
    const groups = ['cctv','sat','kids','sport','movie','news'];
    let html = '';
    groups.forEach(g => {
        const chs = CHANNELS.filter(c => Array.isArray(c.cat) ? c.cat.includes(g) : c.cat === g);
        if (!chs.length) return;
        const s = SECS[g];
        html += `<div class="sec-title"><div class="sec-bar ${s.b}"></div>${s.t}</div>`;
        html += `<div class="ch-grid">${chs.map(chCard).join('')}</div>`;
    });
    document.getElementById('mainPage').innerHTML = html;
}

function renderCat(cat) {
    const chs = CHANNELS.filter(c => Array.isArray(c.cat) ? c.cat.includes(cat) : c.cat === cat);
    const s = SECS[cat];
    document.getElementById('mainPage').innerHTML =
        `<div class="sec-title"><div class="sec-bar ${s.b}"></div>${s.t}</div>` +
        `<div class="ch-grid">${chs.map(chCard).join('')}</div>`;
}

function showCat(el, cat) {
    document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
    el.classList.add('on');
    cat === 'all' ? renderAll() : renderCat(cat);
    window.scrollTo(0,0);
}

function showCatB(cat, el) {
    document.querySelectorAll('.bitem').forEach(b=>b.classList.remove('on'));
    el.classList.add('on');
    const catMap = ['all','cctv','sat','kids','sport'];
    document.querySelectorAll('.cat').forEach((b,i)=>b.classList.toggle('on', catMap[i]===cat));
    cat === 'all' ? renderAll() : renderCat(cat);
    window.scrollTo(0,0);
}

function playCh(idx) {
    curCh = CHANNELS[idx];
    curUrlIdx = 0;
    document.getElementById('ptitle').textContent = curCh.name + ' · 直播';
    document.getElementById('player').classList.add('on');
    document.body.style.overflow = 'hidden';
    startPlay();
}

function startPlay() {
    const video = document.getElementById('video');
    const url = curCh.urls[curUrlIdx];
    document.getElementById('pload').classList.remove('hide');
    document.getElementById('perr').classList.remove('on');
    document.getElementById('pstatus').textContent = `线路 ${curUrlIdx+1}/${curCh.urls.length}`;

    if (hls) { hls.destroy(); hls = null; }

    const onReady = () => document.getElementById('pload').classList.add('hide');
    const onErr = () => {
        if (curUrlIdx + 1 < curCh.urls.length) {
            curUrlIdx++;
            document.getElementById('perrmsg').textContent = `线路${curUrlIdx}不可用，正在切换线路${curUrlIdx+1}...`;
            document.getElementById('perr').classList.add('on');
            setTimeout(startPlay, 1500);
        } else {
            document.getElementById('pload').classList.add('hide');
            document.getElementById('perrmsg').textContent = '所有线路均不可用，请稍后重试';
            document.getElementById('perr').classList.add('on');
        }
    };

    if (Hls.isSupported()) {
        hls = new Hls({enableWorker:true, lowLatencyMode:true, maxBufferLength:10});
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => { onReady(); video.play().catch(()=>{}); });
        hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) onErr(); });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.oncanplay = onReady;
        video.onerror = onErr;
        video.play().catch(()=>{});
    } else {
        onErr();
    }
}

function retryNext() {
    if (curUrlIdx + 1 < curCh.urls.length) {
        curUrlIdx++;
    } else {
        curUrlIdx = 0;
    }
    startPlay();
}

function closePlayer() {
    document.getElementById('player').classList.remove('on');
    document.body.style.overflow = '';
    if (hls) { hls.destroy(); hls = null; }
    document.getElementById('video').src = '';
}

function doSearch() {
    const q = document.getElementById('si').value.trim().toLowerCase();
    if (!q) { renderAll(); return; }
    const res = CHANNELS.filter(c => c.name.toLowerCase().includes(q));
    document.getElementById('mainPage').innerHTML = res.length
        ? `<div class="ch-grid">${res.map(chCard).join('')}</div>`
        : '<div style="padding:60px 0;text-align:center;color:var(--text3)">没有找到相关频道</div>';
}

function toggleTheme() {
    const dark = document.documentElement.classList.toggle('dark');
    document.getElementById('themeBtn').textContent = dark ? '☀️' : '🌙';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
    document.documentElement.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
}

renderAll();
</script>
</body>
</html>
